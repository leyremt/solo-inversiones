name: Actualizar empresas (diario)

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Leer Telegram y actualizar la lista
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: python update.py

      - name: Guardar cambios si los hay
        run: |
          git config user.name  "solo-inversiones-bot"
          git config user.email "bot@users.noreply.github.com"
          git add companies.json state.json
          if git diff --staged --quiet; then
            echo "Sin cambios hoy."
          else
            git commit -m "Update $(date -u +%Y-%m-%d)"
            git push
          fi
